spring.application.name=token-bucket-rate-limiter

# ===============================
# Database Configuration
# NOTE: Credentials should be overridden via environment variables
#       in production (DB_USERNAME, DB_PASSWORD).
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/token_bucket_db
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Pranav12}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.com.pranav.token_bucket_rate_limiter=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE